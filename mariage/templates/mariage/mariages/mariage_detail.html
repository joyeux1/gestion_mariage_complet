{% extends 'mariage/base.html' %}
{% load static %}

{% block title %}Acte de Mariage n° {{ mariage.numero_acte }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'mariage/css/acte_officiel.css' %}?v=8">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 d-print-none">
    <a href="{% url 'mariage_list' %}" class="btn btn-light border shadow-sm">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
    <button type="button" onclick="window.print();" class="btn btn-dark shadow-sm">
        <i class="bi bi-printer-fill me-2"></i> Générer l'Acte Officiel (PDF)
    </button>
</div>

<div class="acte-officiel-wrapper">
{% include 'mariage/partials/acte_mariage_officiel.html' with mariage=mariage user=user %}
</div>
{% endblock %}
