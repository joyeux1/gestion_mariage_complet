{% extends 'mariage/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0">Formulaire d'enregistrement de Mariage</h5>
            </div>
            <div class="card-body p-4">
                <form id="mariageForm" method="post">
                    {% csrf_token %}
                    <div class="row">
                        {% for field in form %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            <div class="invalid-feedback"></div> </div>
                        {% endfor %}
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" id="saveBtn" class="btn btn-success px-4">
                            Enregistrer les données
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Initialisation du script séparé pour ce formulaire
    handleAjaxForm('mariageForm', 'saveBtn');
</script>
{% endblock %}
