<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Connexion</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f5f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-container{
            background:white;
            width:400px;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .login-container h2{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        form p{
            margin-bottom:20px;
        }

        form label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#555;
        }

        form input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        form input:focus{
            outline:none;
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h2>Connexion</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Se connecter
            </button>

        </form>

    </div>

</body>
</html>
